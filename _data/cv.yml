- title: General Information
  type: map
  contents:
    - name: Full Name
      value: Your Name
    - name: Position
      value: Assistant Professor / Ph.D. Student / Researcher
    - name: Email
      value: your.email@example.com
    - name: Location
      value: City, Country

- title: Education
  type: time_table
  contents:
    - title: Ph.D. in Your Field
      institution: University Name
      year: 2022 - 2025
      description:
        - Thesis: Your thesis title
        - Advisor: Prof. Name
    - title: M.S. in Your Field
      institution: University Name
      year: 2020 - 2022
    - title: B.S. in Your Field
      institution: University Name
      year: 2016 - 2020

- title: Experience
  type: time_table
  contents:
    - title: Current Position
      institution: Organization Name
      year: 2025 - present
      description:
        - Short summary of your role, group, or responsibilities.
    - title: Previous Position
      institution: Organization Name
      year: 2023 - 2025

- title: Grants
  type: time_table
  contents:
    - title: Fellowship or Grant Name
      year: 2024
      description: Short description of the award, funding body, or project.

- title: Honors and Awards
  type: time_table
  contents:
    - year: 2025
      items:
        - Best Paper Award / Scholarship / Travel Grant

- title: Research Interests
  type: nested_list
  contents:
